<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPlan — Планирование СЭОГС · УП «МИНГАЗ»</title>
<style>
  :root{
    --navy:#0f2740; --navy2:#16385c; --slate:#1f2d3d; --ink:#1f2937;
    --bg:#eef2f6; --card:#ffffff; --line:#e2e8f0; --muted:#64748b; --txt:#334155;
    --blue:#2563eb; --blue-d:#1d4ed8; --green:#16a34a; --green-l:#dcfce7;
    --yellow:#ca8a04; --yellow-l:#fef9c3; --red:#dc2626; --red-l:#fee2e2;
    --shadow:0 1px 3px rgba(15,39,64,.08),0 1px 2px rgba(15,39,64,.06);
    --shadow-lg:0 10px 30px rgba(15,39,64,.12);
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Segoe UI',Roboto,-apple-system,BlinkMacSystemFont,Arial,sans-serif;
    background:var(--bg);color:var(--txt);font-size:14px;line-height:1.4;
  }
  .app{display:flex;min-height:100vh}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:248px;flex:0 0 248px;background:linear-gradient(180deg,var(--navy),var(--navy2));
    color:#cbd5e1;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:18px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
  .brand .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#22d3ee);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:18px;box-shadow:0 4px 12px rgba(34,211,238,.35)}
  .brand .bt{font-size:15px;font-weight:700;color:#fff;line-height:1.15}
  .brand .bs{font-size:11px;color:#7dd3fc;letter-spacing:.3px}
  .nav{padding:12px 10px;flex:1;overflow-y:auto}
  .nav .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#64748b;padding:14px 10px 6px}
  .nav a{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#cbd5e1;
    text-decoration:none;cursor:pointer;font-size:13.5px;margin-bottom:2px;transition:.15s;border:1px solid transparent;
  }
  .nav a svg{width:18px;height:18px;flex:0 0 18px;opacity:.9}
  .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.active{background:rgba(59,130,246,.18);color:#fff;border-color:rgba(96,165,250,.4)}
  .nav a.active svg{opacity:1}
  .nav .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;border-radius:20px;padding:1px 7px}
  .sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#64748b}

  /* ---------- MAIN ---------- */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    background:var(--card);border-bottom:1px solid var(--line);padding:0 22px;height:62px;
    display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20;
  }
  .topbar h1{font-size:16.5px;font-weight:700;color:var(--ink);margin:0}
  .topbar .crumb{font-size:12px;color:var(--muted)}
  .topbar .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:8px 13px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
  .btn:hover{background:#f8fafc;border-color:#cbd5e1}
  .btn svg{width:16px;height:16px}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.primary:hover{background:var(--blue-d)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:5px 9px;font-size:12px}
  .usr{display:flex;align-items:center;gap:9px;padding-left:6px}
  .usr .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#64748b,#334155);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .usr .un{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.1}
  .usr .ur{font-size:11px;color:var(--muted)}

  /* ---------- VIEW ---------- */
  #view{padding:22px;flex:1}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .card-h h2{margin:0;font-size:14px;color:var(--ink);font-weight:700}
  .card-h .sub{font-size:12px;color:var(--muted)}
  .card-h .spacer{flex:1}
  .card-b{padding:16px}

  /* ---------- DASHBOARD ---------- */
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi .lab{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
  .kpi .val{font-size:27px;font-weight:800;color:var(--ink);margin-top:3px;line-height:1}
  .kpi .hint{font-size:11.5px;color:var(--muted);margin-top:5px}
  .kpi .acc{position:absolute;right:-14px;top:-14px;width:62px;height:62px;border-radius:50%;opacity:.12}
  .dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
  .today-mstr{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:9px}
  .today-mstr .dot{width:10px;height:10px;border-radius:50%;flex:0 0 10px}
  .today-mstr .nm{font-weight:700;color:var(--ink);font-size:13px}
  .today-mstr .ar{font-size:11px;color:var(--muted)}
  .today-mstr .meta{margin-left:auto;text-align:right;font-size:12px}
  .today-mstr .h{font-weight:700}
  .today-mstr .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:3px}
  .tag.over{background:var(--red-l);color:var(--red)}
  .tag.ok{background:var(--green-l);color:var(--green)}
  .taskline{display:flex;gap:8px;font-size:12px;color:var(--txt);margin-top:6px;align-items:center}
  .taskline .pill{font-size:10.5px;padding:1px 6px;border-radius:5px;background:#eef2f6;color:var(--muted)}
  .rz-item{display:flex;gap:10px;padding:11px 0;border-bottom:1px dashed var(--line)}
  .rz-item:last-child{border-bottom:none}
  .rz-bar{width:4px;border-radius:4px;flex:0 0 4px}
  .rz-main{flex:1;min-width:0}
  .rz-t{font-weight:700;color:var(--ink);font-size:13px}
  .rz-s{font-size:11.5px;color:var(--muted);margin-top:2px}
  .rz-dl{font-size:11.5px;font-weight:700;white-space:nowrap}
  .rz-dl.red{color:var(--red)} .rz-dl.yel{color:var(--yellow)}
  .rings{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .ring{display:flex;flex-direction:column;align-items:center;padding:14px 8px;border:1px solid var(--line);border-radius:10px}
  .ring .ar{font-size:11.5px;color:var(--muted);margin-top:7px;font-weight:600}
  .empty{color:var(--muted);font-size:13px;padding:18px;text-align:center}

  /* ---------- CALENDAR ---------- */
  .cal-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .seg{display:inline-flex;background:#e2e8f0;border-radius:9px;padding:3px}
  .seg button{border:none;background:transparent;padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit}
  .seg button.on{background:#fff;color:var(--blue);box-shadow:var(--shadow)}
  .cal-title{font-size:15px;font-weight:700;color:var(--ink)}
  .legend{display:flex;gap:12px;font-size:11.5px;color:var(--muted);margin-left:auto;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .cal-scroll{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);background:#fff}
  .cal-grid{display:grid;min-width:760px}
  .cal-grid.month{min-width:1500px}
  .gh{position:sticky;top:0;z-index:5;background:#f1f5f9}
  .gh.corner{position:sticky;left:0;z-index:8}
  .col-head{text-align:center;padding:8px 4px;font-size:11.5px;color:var(--muted);border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#f1f5f9;min-width:74px}
  .col-head .dn{font-weight:700;color:var(--ink);font-size:14px}
  .col-head .wd{font-size:10px;text-transform:uppercase}
  .col-head.today{background:#eff6ff}
  .col-head.today .dn{color:var(--blue)}
  .col-head.we{color:#94a3b8}
  .mname{position:sticky;left:0;z-index:6;background:#fff;border-right:2px solid var(--line);border-bottom:1px solid var(--line);padding:9px 11px;min-width:170px;display:flex;align-items:center;gap:9px}
  .mname .dot{width:9px;height:9px;border-radius:50%}
  .mname .nm{font-weight:700;color:var(--ink);font-size:12.5px;line-height:1.1}
  .mname .ar{font-size:10.5px;color:var(--muted)}
  .cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:62px;padding:4px;display:flex;flex-direction:column;gap:4px;background:#fff;position:relative}
  .cell.we{background:#fafbfc}
  .cell.today{background:#f5f9ff}
  .cell.drop-on{background:#dbeafe!important;outline:2px dashed var(--blue);outline-offset:-3px}
  .cell.overload{box-shadow:inset 0 0 0 2px var(--red)}
  .cell .ov-warn{position:absolute;top:2px;right:3px;font-size:9px;font-weight:800;color:#fff;background:var(--red);border-radius:5px;padding:0 4px}
  .tile{border-radius:6px;padding:4px 6px;font-size:10.5px;line-height:1.2;cursor:grab;background:#eef2f6;border-left:3px solid #94a3b8;position:relative;user-select:none}
  .tile:active{cursor:grabbing}
  .tile.dragging{opacity:.4}
  .tile .tw{font-weight:600;color:var(--ink);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tile .th{font-size:9.5px;color:var(--muted)}
  .tile.t-green{background:var(--green-l);border-left-color:var(--green)}
  .tile.t-green .tw{color:#14532d}
  .tile.t-yellow{background:var(--yellow-l);border-left-color:var(--yellow)}
  .tile.t-yellow .tw{color:#713f12}
  .tile.t-red{background:var(--red-l);border-left-color:var(--red)}
  .tile.t-red .tw{color:#7f1d1d}
  .tile.t-done{background:#f1f5f9;border-left-color:#94a3b8;opacity:.7}
  .tile.t-done .tw{color:#64748b;text-decoration:line-through}
  .tile .chk{position:absolute;right:3px;top:3px;font-size:10px;color:var(--green)}
  .read-only .tile{cursor:default}

  /* tooltip */
  #tip{position:fixed;z-index:200;background:var(--slate);color:#fff;padding:9px 11px;border-radius:8px;font-size:11.5px;max-width:260px;box-shadow:var(--shadow-lg);pointer-events:none;display:none;line-height:1.5}
  #tip b{color:#7dd3fc}

  /* ---------- MAP ---------- */
  .map-wrap{display:grid;grid-template-columns:330px 1fr;gap:16px}
  .mlist{max-height:70vh;overflow:auto}
  .mtask{display:flex;gap:9px;padding:10px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;cursor:pointer;transition:.12s;background:#fff}
  .mtask:hover{border-color:var(--blue);background:#f8faff}
  .mtask.sel{border-color:var(--blue);background:#eff6ff;box-shadow:0 0 0 2px rgba(37,99,235,.18)}
  .mtask .pin{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 24px}
  .mtask .mt-t{font-weight:700;color:var(--ink);font-size:12.5px}
  .mtask .mt-s{font-size:11px;color:var(--muted)}
  .map-box{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:#dbe4ec;min-height:520px;position:relative}
  .map-note{position:absolute;left:10px;bottom:10px;background:rgba(15,39,64,.85);color:#fff;font-size:11px;padding:6px 10px;border-radius:7px;z-index:5;max-width:300px}
  .map-stats{display:flex;gap:8px;padding:10px 12px;background:#f1f5f9;border-bottom:1px solid var(--line);font-size:12px;flex-wrap:wrap}
  .map-stats b{color:var(--ink)}

  /* ---------- REFERENCES ---------- */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .tabs button{border:none;background:transparent;padding:10px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
  .tabs button.on{color:var(--blue);border-bottom-color:var(--blue)}
  table.dt{width:100%;border-collapse:collapse;font-size:12.5px}
  table.dt th{text-align:left;background:#f8fafc;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:9px 11px;border-bottom:1px solid var(--line);font-weight:700}
  table.dt td{padding:9px 11px;border-bottom:1px solid var(--line);color:var(--txt)}
  table.dt tr:hover td{background:#f8fafc}
  .chip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:#eef2f6;color:var(--muted)}
  .chip.ГРП{background:#dbeafe;color:#1d4ed8}
  .chip.ШРП{background:#dcfce7;color:#15803d}
  .chip.Трасса{background:#fef3c7;color:#b45309}
  .tree ul{list-style:none;padding-left:18px;margin:4px 0}
  .tree .grp{font-weight:700;color:var(--ink);font-size:13px;padding:5px 0;display:flex;align-items:center;gap:6px;cursor:pointer}
  .tree .grp svg{width:14px;height:14px}
  .tree li.w{padding:6px 0;display:flex;align-items:center;gap:10px;font-size:12.5px;border-bottom:1px dashed var(--line)}
  .tree .norm{margin-left:auto;color:var(--muted);font-size:12px}
  .tree .norm b{color:var(--ink)}
  .imp-box{border:2px dashed #cbd5e1;border-radius:12px;padding:30px;text-align:center;color:var(--muted)}
  .imp-box .ic{font-size:34px;margin-bottom:8px}
  .imp-box h3{margin:0 0 4px;color:var(--ink);font-size:15px}

  /* ---------- MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(15,39,64,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);overflow:hidden}
  .modal-h{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}
  .modal-h h3{margin:0;font-size:15px;color:var(--ink)}
  .modal-h .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px;background:none;border:none}
  .modal-b{padding:18px}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .fld input,.fld select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
  .calc{background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:11px 13px;font-size:12.5px;color:#1e3a8a;display:flex;align-items:center;gap:8px}
  .calc b{color:var(--blue-d)}
  .modal-f{padding:13px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px;background:#f8fafc}

  /* ---------- TOAST ---------- */
  #toasts{position:fixed;right:18px;bottom:18px;z-index:300;display:flex;flex-direction:column;gap:9px}
  .toast{background:var(--slate);color:#fff;padding:12px 15px;border-radius:10px;font-size:13px;box-shadow:var(--shadow-lg);max-width:340px;border-left:4px solid var(--blue);animation:in .2s ease}
  .toast.ok{border-left-color:var(--green)} .toast.warn{border-left-color:var(--yellow)} .toast.err{border-left-color:var(--red)}
  @keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  @media(max-width:980px){
    .sidebar{position:fixed;left:-260px;z-index:50;transition:.2s}
    .sidebar.open{left:0}
    .kpi-row{grid-template-columns:repeat(2,1fr)}
    .dash-grid{grid-template-columns:1fr}
    .map-wrap{grid-template-columns:1fr}
    .burger{display:inline-flex!important}
  }
  .burger{display:none;background:none;border:1px solid var(--line);border-radius:8px;padding:7px;cursor:pointer;align-items:center;justify-content:center}
  .burger svg{width:18px;height:18px}

  /* ---------- ЭКРАН ВХОДА ---------- */
  .login-screen{position:fixed;inset:0;z-index:500;background:linear-gradient(135deg,#0f2740,#16385c);display:flex;align-items:center;justify-content:center;padding:20px}
  body.logged-in .login-screen{display:none}
  .login-card{background:#fff;border-radius:16px;width:100%;max-width:384px;box-shadow:0 24px 70px rgba(0,0,0,.4);overflow:hidden}
  .login-brand{display:flex;align-items:center;gap:11px;padding:18px 20px;background:#f8fafc;border-bottom:1px solid var(--line)}
  .login-brand .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#3b82f6,#22d3ee);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:19px}
  .login-brand .bt{font-size:16px;font-weight:800;color:var(--ink)}
  .login-brand .bs{font-size:11px;color:var(--muted)}
  .login-body{padding:22px 20px}
  .login-body h2{margin:0 0 14px;font-size:16px;color:var(--ink)}
  .li-err{color:var(--red);font-size:12px;min-height:15px;margin-bottom:8px}
  .li-hint{margin-top:14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:10px 12px;font-size:11.5px;color:#1e3a8a;line-height:1.8}
  .li-hint code{background:#dbeafe;padding:1px 5px;border-radius:4px;font-weight:700}
  body:not(.logged-in) .app{display:none}

  /* ---------- ЧИПЫ РОЛЕЙ ---------- */
  .chip.navy{background:#e2e8f0;color:#0f2740}
  .chip.blue{background:#dbeafe;color:#1d4ed8}
  .chip.purple{background:#ede9fe;color:#6d28d9}
  .chip.teal{background:#ccfbf1;color:#0f766e}
  .fld label.cb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:600;cursor:pointer}
  .fld label.cb input{width:auto;margin:0}
</style>
</head>
<body>
<!-- ЭКРАН ВХОДА -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="logo">S</div>
      <div>
        <div class="bt">SmartPlan</div>
        <div class="bs">Планирование СЭОГС · УП «МИНГАЗ»</div>
      </div>
    </div>
    <div class="login-body">
      <h2>Вход в систему</h2>
      <form id="login-form">
        <div class="fld"><label>Логин</label><input id="li-login" autocomplete="username" placeholder="Введите логин"></div>
        <div class="fld"><label>Пароль</label><input id="li-pass" type="password" autocomplete="current-password" placeholder="••••••"></div>
        <div class="li-err" id="li-err"></div>
        <button class="btn primary" type="submit" id="li-btn" style="width:100%;justify-content:center">Войти</button>
      </form>
    </div>
  </div>
</div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <div class="bt">SmartPlan</div>
        <div class="bs">Планирование СЭОГС</div>
      </div>
    </div>
    <nav class="nav" id="nav">
      <div class="grp">Оперативная работа</div>
